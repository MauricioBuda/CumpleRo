<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> ❤️ Pumple Ro ❤️ </title>

        <!-- Íconos para navegador -->
    <link rel="icon" type="image/png" sizes="32x32" href="/img/FaviconRo.png">

    <!-- Ícono para Apple (pantalla de inicio iOS) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/img/FaviconRo.png">

    <!-- Manifest para Android -->
    <link rel="manifest" href="/manifest.json">


    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./src/style.css">

</head>

<body>

    <!-- Imagen de fondo -->
    <div id="background"></div>

    <!-- Oscurece levemente la foto -->
    <div id="overlay"></div>

    <!-- Partículas -->
    <div id="particles"></div>

    <!-- Confeti -->
    <div id="confetti"></div>

    <!-- Destellos -->
    <div id="sparkles"></div>

    <!-- Contenido principal -->
    <main class="contenedor">

        <h1 id="titulo">
            Faltan varios dias
        </h1>

        <p id="mensaje">
            Cada segundo nos acerca un poquito más...
        </p>

        <section id="contador" class="contador">

            <div class="card">

                <span id="dias">00</span>
                <small>Días</small>

            </div>

            <div class="card">

                <span id="horas">00</span>
                <small>Horas</small>

            </div>

            <div class="card">

                <span id="minutos">00</span>
                <small>Minutos</small>

            </div>

            <div class="card">

                <span id="segundos">00</span>
                <small>Segundos</small>

            </div>

        </section>

        <!-- Acá aparecerán los acertijos, videos y regalos -->
        <section id="contenido"></section>

    </main>


    <button id="btnReset" title="Reiniciar aventura">

    ↺

</button>

    <script type="module" src="./src/app.js"></script>



    <audio id="musicaFondo" loop>

    <source src="/audio/musica.mp3" type="audio/mpeg">

</audio>

<button id="btnMusica" title="Música">

    🔇

</button>




</body>

</html>
